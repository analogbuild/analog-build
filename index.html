<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>analog.build</title><style>@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;font-family:'Courier Prime','Courier New',monospace;background:#fff;overflow:hidden;touch-action:none}#vp{position:fixed;inset:0;background:#fff}#cv{display:block;width:100%;height:100%}#topbar{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;padding:0 16px;justify-content:space-between;z-index:50;pointer-events:none}.tb-logo{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#111;pointer-events:all;text-decoration:none;background:rgba(255,255,255,0.85);padding:5px 10px;border:1px solid rgba(0,0,0,0.08)}.tb-logo em{font-style:normal;font-weight:400;opacity:.4;font-size:9px;letter-spacing:2px;margin-left:6px}#mode-float{position:fixed;top:12px;right:12px;display:flex;gap:4px;z-index:50}.mf-btn{background:rgba(255,255,255,0.92);border:1px solid rgba(0,0,0,0.12);color:#888;font-family:'Courier Prime',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}.mf-btn:hover,.mf-btn:active{background:#111;color:#fff;border-color:#111}.mf-btn.on{background:#111;color:#fff;border-color:#111}#ghostinfo{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.1);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;color:#888;pointer-events:none;white-space:nowrap;z-index:50}#drawer{position:fixed;bottom:0;left:0;right:0;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);transform:translateY(calc(100% - 44px))}#drawer.open{transform:translateY(0)}#drawer-handle{height:44px;background:rgba(17,17,17,0.94);display:flex;align-items:center;padding:0 16px;cursor:pointer;justify-content:space-between;-webkit-tap-highlight-color:transparent}.dh-left{display:flex;align-items:center;gap:12px}.dh-label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(245,242,235,0.5)}.dh-counts{display:flex;gap:8px}.dh-count{font-size:9px;letter-spacing:1px;color:rgba(245,242,235,0.35)}.dh-count b{color:rgba(245,242,235,0.7);font-weight:700}.dh-arrow{font-size:10px;color:rgba(245,242,235,0.3);transition:transform .3s}#drawer.open .dh-arrow{transform:rotate(180deg)}#drawer-body{background:#f5f2eb;border-top:1px solid #ddd;padding:16px;max-height:60vh;overflow-y:auto}.d-section{margin-bottom:16px}.d-label{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#999;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e8e8e8}.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}.tcard{border:1px solid #ccc;background:#fff;padding:10px 4px;cursor:pointer;text-align:center;transition:all .12s;-webkit-tap-highlight-color:transparent}.tcard:active{border-color:#111}.tcard.on{border:2px solid #111}.tf{font-size:14px;font-weight:700;color:#111}.td{font-size:8px;color:#aaa;margin-top:1px}.rot-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}.rot-row input[type=range]{flex:1;accent-color:#111;cursor:pointer;height:2px}.rot-val{font-size:11px;font-weight:700;color:#111;min-width:32px;text-align:right}.snaps{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}.snap{background:#fff;border:1px solid #ddd;color:#aaa;font-family:'Courier Prime',monospace;font-size:9px;padding:5px 2px;cursor:pointer;text-align:center;transition:all .12s;-webkit-tap-highlight-color:transparent}.snap:active{border-color:#111;color:#111}.depth-row{display:flex;align-items:center;gap:8px}.depth-row input[type=range]{flex:1;accent-color:#111;cursor:pointer}.depth-val{font-size:11px;font-weight:700;color:#111;min-width:16px;text-align:right}.sel-block{background:#fff;border:1px solid #e0e0e0;padding:10px 12px;margin-top:4px}.sir{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed #eee;font-size:10px}.sir:last-of-type{border:none}.sk{color:#aaa}.sv{font-weight:700;color:#111}.clist{display:flex;flex-direction:column;gap:3px;max-height:140px;overflow-y:auto}.ci{display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent}.ci.sel{border:2px solid #111;background:#f5f2eb}.cdot{width:8px;height:8px;border:1.5px solid #111;border-radius:50%;flex-shrink:0}.cdot.f{background:#111}.cdot.g{background:#888;border-color:#888}.ci-n{font-size:10px;font-weight:700;letter-spacing:1px;flex:1}.ci-s{font-size:8px;color:#aaa}.ci-x{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;line-height:1;font-family:inherit}.ci-x:hover{color:#111}.act-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}.act-btn{background:#fff;border:1px solid #111;color:#111;font-family:'Courier Prime',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:9px;cursor:pointer;text-transform:uppercase;transition:all .12s;-webkit-tap-highlight-color:transparent}.act-btn:active{background:#111;color:#f5f2eb}#controls-hint{position:fixed;bottom:52px;left:14px;font-size:9px;color:rgba(0,0,0,0.25);line-height:2;pointer-events:none;letter-spacing:.5px}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ddd}</style></head><body><div id="vp"><canvas id="cv"></canvas></div><div id="topbar"><a href="/" class="tb-logo">analog.build <em>/ beta</em></a></div><div id="mode-float"><button class="mf-btn on" onclick="setMode('place',this)">Place</button><button class="mf-btn" onclick="setMode('move',this)">Move</button><button class="mf-btn" onclick="setMode('remove',this)">Remove</button></div><div id="ghostinfo">TAP TO PLACE</div><div id="controls-hint">ONE FINGER ....... orbit<br>TWO FINGERS ...... zoom<br>RIGHT DRAG ....... pan</div><div id="drawer"><div id="drawer-handle" onclick="toggleDrawer()"><div class="dh-left"><div class="dh-label">Controls</div><div class="dh-counts"><div class="dh-count"><b id="hc">0</b> units</div><div class="dh-count"><b id="h10">0</b>×10</div><div class="dh-count"><b id="h20">0</b>×20</div><div class="dh-count"><b id="h40">0</b>×40</div></div></div><div class="dh-arrow">▲</div></div><div id="drawer-body"><div class="d-section"><div class="d-label">Container</div><div class="type-row"><div class="tcard" id="t10" onclick="setType(10)"><div class="tf">10ft</div><div class="td">10×8×8.5</div></div><div class="tcard on" id="t20" onclick="setType(20)"><div class="tf">20ft</div><div class="td">20×8×8.5</div></div><div class="tcard" id="t40" onclick="setType(40)"><div class="tf">40ft</div><div class="td">40×8×8.5</div></div></div></div><div class="d-section"><div class="d-label">Rotation</div><div class="rot-row"><input type="range" id="rsl" min="0" max="359" step="1" value="0" oninput="setRot(+this.value)"><span class="rot-val" id="rv">0°</span></div><div class="snaps"><button class="snap" onclick="snapRot(0)">0°</button><button class="snap" onclick="snapRot(45)">45°</button><button class="snap" onclick="snapRot(90)">90°</button><button class="snap" onclick="snapRot(135)">135°</button><button class="snap" onclick="snapRot(180)">180°</button><button class="snap" onclick="snapRot(225)">225°</button><button class="snap" onclick="snapRot(270)">270°</button><button class="snap" onclick="snapRot(315)">315°</button></div></div><div class="d-section"><div class="d-label">Burial Depth</div><div class="depth-row"><input type="range" id="dsl" min="0" max="4" step="1" value="0" oninput="setDepth(+this.value)"><span class="depth-val" id="dv">0</span></div><div style="font-size:8px;color:#bbb;margin-top:4px;letter-spacing:.5px">0 = surface · 1–4 = below grade</div></div><div class="d-section" id="sel-section" style="display:none"><div class="d-label">Selected</div><div class="sel-block" id="selbody"></div></div><div class="d-section"><div class="d-label">Layout</div><div class="clist" id="clist"></div></div><div class="act-row"><button class="act-btn" onclick="removeSelected()">Remove</button><button class="act-btn" onclick="clearAll()">Clear All</button></div></div></<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script>const FT=0.1;const DIMS={10:{l:1,w:.8,h:.85},20:{l:2,w:.8,h:.85},40:{l:4,w:.8,h:.85}};const CHEIGHT=.85;let appMode='place',curType=20,curRot=0,curDep=0,boxes=[],selId=null,nextId=0,ghostGrp=null,drawerOpen=false;const vpEl=document.getElementById('vp');const canEl=document.getElementById('cv');const renderer=new THREE.WebGLRenderer({canvas:canEl,antialias:true});renderer.setClearColor(0xffffff,1);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.shadowMap.enabled=true;const scene=new THREE.Scene();scene.background=new THREE.Color(0xffffff);const camera=new THREE.PerspectiveCamera(45,1,.01,500);camera.position.set(0,1.5,2.5);camera.lookAt(0,0,0);function fitCanvas(){const w=vpEl.clientWidth,h=vpEl.clientHeight;canEl.style.width=w+'px';canEl.style.height=h+'px';renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}fitCanvas();window.addEventListener('resize',fitCanvas);scene.add(new THREE.AmbientLight(0xffffff,.85));const sun=new THREE.DirectionalLight(0xffffff,.6);sun.position.set(5,12,8);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);scene.add(sun);const gnd=new THREE.Mesh(new THREE.PlaneGeometry(1000,1000),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));gnd.rotation.x=-Math.PI/2;scene.add(gnd);scene.add(new THREE.GridHelper(20,40,0xcccccc,0xeeeeee));const orb={theta:.5,phi:.85,r:2.5,cx:0,cz:0};function applyCamera(){camera.position.set(orb.cx+orb.r*Math.sin(orb.phi)*Math.sin(orb.theta),orb.r*Math.cos(orb.phi),orb.cz+orb.r*Math.sin(orb.phi)*Math.cos(orb.theta));camera.lookAt(orb.cx,0,orb.cz);}applyCamera();const rc=new THREE.Raycaster();function toNDC(cx,cy){const r=canEl.getBoundingClientRect();return new THREE.Vector2(((cx-r.left)/r.width)*2-1,-((cy-r.top)/r.height)*2+1);}function rayGnd(cx,cy){rc.setFromCamera(toNDC(cx,cy),camera);const h=rc.intersectObject(gnd);return h.length?h[0].point.clone():null;}function rayBoxes(cx,cy){rc.setFromCamera(toNDC(cx,cy),camera);const m=[];boxes.forEach(b=>b.grp.traverse(c=>{if(c.isMesh)m.push(c);}));const h=rc.intersectObjects(m,false);if(!h.length)return null;return boxes.find(b=>{let f=false;b.grp.traverse(c=>{if(c===h[0].object)f=true;});return f;})||null;}function buildBox(type,depth,selected,ghost){const d=DIMS[type],g=new THREE.Group();const cm={10:0xffffff,20:0xdddddd,40:0xbbbbbb};const bc=ghost?0x444444:depth>0?0xeeeeee:cm[type];const op=ghost?.18:depth>0?.65:1;const geo=new THREE.BoxGeometry(d.l,d.h,d.w);const mesh=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:bc,transparent:op<1,opacity:op}));mesh.castShadow=!ghost;mesh.receiveShadow=!ghost;g.add(mesh);g.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:selected?0x000000:0x444444,transparent:ghost,opacity:ghost?.5:1})));if(!ghost){const n=type===10?4:type===20?7:13;const lm=new THREE.LineBasicMaterial({color:0x999999,transparent:true,opacity:.4});for(let i=0;i<n;i++){const t=(i+1)/(n+1),x=(t-.5)*d.l;for(const sz of[-1,1]){const pts=[new THREE.Vector3(x,-d.h*.499,sz*d.w*.501),new THREE.Vector3(x,d.h*.499,sz*d.w*.501)];g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lm.clone()));}}}return g;}function rebuildMesh(b){scene.remove(b.grp);b.grp=buildBox(b.type,b.depth,b.id===selId,false);b.grp.rotation.y=THREE.MathUtils.degToRad(b.rot);b.grp.position.copy(b.pos);scene.add(b.grp);}function showGhost(pt){clearGhost();if(appMode!=='place'||!pt)return;ghostGrp=buildBox(curType,0,false,true);ghostGrp.rotation.y=THREE.MathUtils.degToRad(curRot);ghostGrp.position.set(pt.x,stackTop(pt.x,pt.z)-curDep*CHEIGHT,pt.z);scene.add(ghostGrp);}function clearGhost(){if(ghostGrp){scene.remove(ghostGrp);ghostGrp=null;}}function stackTop(wx,wz){let top=CHEIGHT/2;const nr=Math.max(DIMS[curType].l,DIMS[curType].w)*.55;boxes.forEach(b=>{const dx=wx-b.pos.x,dz=wz-b.pos.z;if(Math.sqrt(dx*dx+dz*dz)<nr+Math.max(DIMS[b.type].l,DIMS[b.type].w)*.55){const s=b.pos.y+CHEIGHT/2;if(s>=top)top=s+CHEIGHT/2;}});return top;}function placeAt(wx,wz){const id=++nextId,y=stackTop(wx,wz)-curDep*CHEIGHT,pos=new THREE.Vector3(wx,y,wz),grp=buildBox(curType,curDep,false,false);grp.rotation.y=THREE.MathUtils.degToRad(curRot);grp.position.copy(pos);scene.add(grp);boxes.push({id,type:curType,rot:curRot,depth:curDep,pos,grp});refreshUI();}function removeBox(id){const i=boxes.findIndex(b=>b.id===id);if(i<0)return;scene.remove(boxes[i].grp);boxes.splice(i,1);if(selId===id)selId=null;refreshUI();}function removeSelected(){if(selId!==null)removeBox(selId);}function clearAll(){boxes.forEach(b=>scene.remove(b.grp));boxes=[];selId=null;clearGhost();refreshUI();}function selectBox(box){const prev=boxes.find(b=>b.id===selId);selId=box?box.id:null;if(prev)rebuildMesh(prev);if(box){rebuildMesh(box);curRot=box.rot;document.getElementById('rsl').value=curRot;document.getElementById('rv').textContent=curRot+'°';}refreshUI();}function moveSelected(wx,wz){const b=boxes.find(b=>b.id===selId);if(!b)return;const y=stackTop(wx,wz)-b.depth*CHEIGHT;b.pos.set(wx,y,wz);b.grp.position.copy(b.pos);refreshUI();}function toggleDrawer(){drawerOpen=!drawerOpen;document.getElementById('drawer').classList.toggle('open',drawerOpen);}let ptrs={},gestPinch=null,rightDown=false,rightLx=0,rightLy=0;function ptDown(id,cx,cy){ptrs[id]={cx,cy,ox:cx,oy:cy,moved:false};}function ptMove(id,cx,cy){if(!ptrs[id])return;const dx=cx-ptrs[id].cx,dy=cy-ptrs[id].cy;if(Math.abs(cx-ptrs[id].ox)+Math.abs(cy-ptrs[id].oy)>5)ptrs[id].moved=true;ptrs[id].cx=cx;ptrs[id].cy=cy;const n=Object.keys(ptrs).length;if(n>=2){const v=Object.values(ptrs);const d2=Math.sqrt(Math.pow(v[0].cx-v[1].cx,2)+Math.pow(v[0].cy-v[1].cy,2));if(!gestPinch)gestPinch={dist:d2,r:orb.r};else{orb.r=Math.max(.5,Math.min(60,gestPinch.r*(gestPinch.dist/d2)));applyCamera();}return;}if(ptrs[id].moved){if(appMode==='move'&&selId!==null){const pt=rayGnd(cx,cy);if(pt)moveSelected(pt.x,pt.z);return;}orb.theta-=dx*.008;orb.phi=Math.max(.08,Math.min(Math.PI*.47,orb.phi+dy*.008));applyCamera();}if(appMode==='place'&&!ptrs[id].moved){const pt=rayGnd(cx,cy);if(pt)showGhost(pt);}}function ptUp(id,cx,cy){const ptr=ptrs[id];delete ptrs[id];gestPinch=null;if(!ptr||ptr.moved)return;if(appMode==='place'){const pt=rayGnd(cx,cy);if(pt)placeAt(pt.x,pt.z);return;}const hit=rayBoxes(cx,cy);if(appMode==='remove'){if(hit)removeBox(hit.id);return;}if(appMode==='move')selectBox(hit||null);}canEl.addEventListener('mousedown',e=>{e.preventDefault();if(e.button===2){rightDown=true;rightLx=e.clientX;rightLy=e.clientY;return;}ptDown('mouse',e.clientX,e.clientY);});window.addEventListener('mousemove',e=>{if(rightDown){const dx=e.clientX-rightLx,dy=e.clientY-rightLy;rightLx=e.clientX;rightLy=e.clientY;const r=new THREE.Vector3();r.crossVectors(camera.getWorldDirection(new THREE.Vector3()),new THREE.Vector3(0,1,0)).normalize();orb.cx-=r.x*dx*.003*orb.r;orb.cz-=r.z*dx*.003*orb.r;orb.cz+=dy*.003*orb.r;applyCamera();return;}ptMove('mouse',e.clientX,e.clientY);});window.addEventListener('mouseup',e=>{if(e.button===2){rightDown=false;return;}ptUp('mouse',e.clientX,e.clientY);});canEl.addEventListener('wheel',e=>{e.preventDefault();orb.r=Math.max(.5,Math.min(60,orb.r+e.deltaY*.01));applyCamera();},{passive:false});canEl.addEventListener('contextmenu',e=>e.preventDefault());canEl.addEventListener('touchstart',e=>{e.preventDefault();Array.from(e.changedTouches).forEach(t=>ptDown(t.identifier,t.clientX,t.clientY));},{passive:false});canEl.addEventListener('touchmove',e=>{e.preventDefault();Array.from(e.changedTouches).forEach(t=>ptMove(t.identifier,t.clientX,t.clientY));},{passive:false});canEl.addEventListener('touchend',e=>{e.preventDefault();Array.from(e.changedTouches).forEach(t=>ptUp(t.identifier,t.clientX,t.clientY));},{passive:false});canEl.addEventListener('touchcancel',e=>{Array.from(e.changedTouches).forEach(t=>delete ptrs[t.identifier]);},{passive:false});function setMode(m,btn){appMode=m;document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');const hints={place:'TAP TO PLACE',move:'TAP TO SELECT — DRAG TO MOVE',remove:'TAP TO REMOVE'};document.getElementById('ghostinfo').textContent=hints[m];if(m!=='place')clearGhost();}function setType(t){curType=t;[10,20,40].forEach(n=>document.getElementById('t'+n).classList.toggle('on',n===t));}function setRot(deg){curRot=deg;document.getElementById('rv').textContent=deg+'°';const b=boxes.find(b=>b.id===selId);if(b){b.rot=deg;b.grp.rotation.y=THREE.MathUtils.degToRad(deg);}}function snapRot(deg){curRot=deg;document.getElementById('rsl').value=deg;document.getElementById('rv').textContent=deg+'°';const b=boxes.find(b=>b.id===selId);if(b){b.rot=deg;b.grp.rotation.y=THREE.MathUtils.degToRad(deg);}}function setDepth(v){curDep=v;document.getElementById('dv').textContent=v;}function refreshUI(){document.getElementById('hc').textContent=boxes.length;document.getElementById('h10').textContent=boxes.filter(b=>b.type===10).length;document.getElementById('h20').textContent=boxes.filter(b=>b.type===20).length;document.getElementById('h40').textContent=boxes.filter(b=>b.type===40).length;const sel=boxes.find(b=>b.id===selId);const ss=document.getElementById('sel-section');const sb=document.getElementById('selbody');ss.style.display=sel?'block':'none';if(sel){const f=v=>(v/FT).toFixed(1);sb.innerHTML=`<div class="sir"><span class="sk">ID</span><span class="sv">#${String(sel.id).padStart(3,'0')}</span></div><div class="sir"><span class="sk">TYPE</span><span class="sv">${sel.type}FT ISO</span></div><div class="sir"><span class="sk">ROT</span><span class="sv">${sel.rot}°</span></div><div class="sir"><span class="sk">BURIED</span><span class="sv">${sel.depth>0?sel.depth+' unit(s)':'no'}</span></div>`;}const listEl=document.getElementById('clist');listEl.innerHTML='';[...boxes].reverse().forEach(b=>{const div=document.createElement('div');div.className='ci'+(b.id===selId?' sel':'');const dc=b.type===40?'g':b.type===20?'f':'';div.innerHTML=`<div class="cdot ${dc}"></div><div style="flex:1"><div class="ci-n">#${String(b.id).padStart(3,'0')} · ${b.type}FT</div><div class="ci-s">${b.rot}° · ${b.depth>0?'-'+b.depth+' depth':'surface'}</div></div><button class="ci-x" onclick="removeBox(${b.id});event.stopPropagation()">×</button>`;div.addEventListener('click',()=>{const found=boxes.find(bb=>bb.id===b.id);if(found)selectBox(found);});listEl.appendChild(div);});}refreshUI();(function tick(){requestAnimationFrame(tick);renderer.render(scene,camera);})();</script></body></html>
